# Nombre de la aplicación
spring.application.name=BILLING-SERVICE

# Puerto donde corre el microservicio de Billing
server.port=8088

# URL de conexión a la base de datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/db_facturacion

# Usuario de MySQL
spring.datasource.username=root

# Password de MySQL
spring.datasource.password=system

# Driver que permite conectar Java con MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate no crea ni modifica tablas, porque las tablas las crea Flyway
spring.jpa.hibernate.ddl-auto=none

# Muestra las consultas SQL en la consola
spring.jpa.show-sql=true

# Da formato al SQL mostrado en consola
spring.jpa.properties.hibernate.format_sql=true

# Dialecto de Hibernate para MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Clave secreta usada para validar el token JWT
jwt.secret=clave_secreta_perfulandia_123456789_usuarios

# Activa Flyway para ejecutar migraciones SQL
spring.flyway.enabled=true

# Carpeta donde están los archivos de migración
spring.flyway.locations=classpath:db/migration

# Permite iniciar Flyway si la base ya existe
spring.flyway.baseline-on-migrate=true

# Permite usar flyway clean en desarrollo
spring.flyway.clean-disabled=false

order.service.url=http://localhost:8087
sucursal.service.url=http://localhost:8090

# Para habilitar configuración con swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Registro del microservicio Billing en Eureka Server.
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

springdoc.enable-hateoas=false
