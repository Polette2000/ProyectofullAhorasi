# Nombre de la aplicacion durante pruebas.
spring.application.name=inventory-test
 
# Base de datos en memoria H2. Se crea al iniciar las pruebas y desaparece al terminar.
spring.datasource.url=jdbc:h2:mem:inventorydb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
 
# Driver JDBC de H2.
spring.datasource.driver-class-name=org.h2.Driver
 
# Usuario por defecto de H2.
spring.datasource.username=sa
 
# Password vacia para H2.
spring.datasource.password=
 
# Hibernate crea las tablas al iniciar y las elimina al cerrar el contexto.
spring.jpa.hibernate.ddl-auto=create-drop
 
# Muestra SQL en consola para entender que consultas ejecuta JPA.
spring.jpa.show-sql=true
 
# Evita consultas JPA fuera de la capa service durante la serializacion.
spring.jpa.open-in-view=false
 
# Clave secreta de prueba para el filtro JWT.
jwt.secret=clave-secreta-de-prueba-con-longitud-suficiente

# URLs de prueba para crear los WebClient sin depender de otros microservicios.
producto.service.url=http://localhost:8084
sucursal.service.url=http://localhost:8090
 
# Opcional: desactiva Swagger en pruebas si no lo necesitas.
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Desactiva Eureka durante pruebas unitarias.
eureka.client.enabled=false
