spring.application.name=VENTAS-SERVICE

# Puerto donde corre el microservicio de ventas
server.port=8091

# URL de conexion a la base de datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/db_ventas

# Usuario de MySQL
spring.datasource.username=root

# Password de MySQL
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Driver que permite conectar Java con MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate valida las tablas creadas por Flyway
spring.jpa.hibernate.ddl-auto=validate

# Muestra las consultas SQL en la consola
spring.jpa.show-sql=true

# Da formato al SQL mostrado en consola
spring.jpa.properties.hibernate.format_sql=true

# Dialecto de Hibernate para MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Clave secreta usada para validar el token JWT
jwt.secret=${JWT_SECRET}

# URL del microservicio de pedidos
order.service.url=http://localhost:8087

# URL del microservicio de facturacion
facturacion.service.url=http://localhost:8088

# Activa Flyway para ejecutar migraciones SQL
spring.flyway.enabled=true

# Carpeta donde estan los archivos de migracion
spring.flyway.locations=classpath:db/migration

# Permite iniciar Flyway si la base ya existe
spring.flyway.baseline-on-migrate=true

# Permite usar flyway clean en desarrollo
spring.flyway.clean-disabled=false
