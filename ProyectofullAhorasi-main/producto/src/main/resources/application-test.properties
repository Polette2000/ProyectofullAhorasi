# Nombre de la aplicacion durante pruebas.
spring.application.name=producto-test

# Base de datos en memoria H2. Se usa en modo MySQL para aceptar las migraciones Flyway.
spring.datasource.url=jdbc:h2:mem:productodb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false

# Driver JDBC de H2.
spring.datasource.driver-class-name=org.h2.Driver

# Usuario por defecto de H2.
spring.datasource.username=sa

# Password vacia para H2.
spring.datasource.password=

# Hibernate valida la estructura creada por Flyway.
spring.jpa.hibernate.ddl-auto=validate

# Muestra SQL en consola durante las pruebas.
spring.jpa.show-sql=true

# Evita consultas JPA fuera de la capa service durante pruebas.
spring.jpa.open-in-view=false

# Clave secreta de prueba para JWT.
jwt.secret=clave-secreta-de-prueba-con-longitud-suficiente

# Desactiva Swagger durante pruebas.
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Desactiva Eureka durante pruebas unitarias.
eureka.client.enabled=false
