spring.application.name=PROVEEDOR-SERVICE

# Puerto donde corre el microservicio de proveedores
server.port=8083

# URL de conexion a la base de datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/db_proveedores

# Usuario de MySQL
spring.datasource.username=root

# Password de MySQL
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Driver que permite conectar Java con MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate no crea ni modifica tablas, porque las tablas las crea Flyway
spring.jpa.hibernate.ddl-auto=none

# Muestra las consultas SQL en la consola
spring.jpa.show-sql=true

# Da formato al SQL mostrado en consola
spring.jpa.properties.hibernate.format_sql=true

# Dialecto de Hibernate para MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Clave secreta usada para validar el token JWT
jwt.secret=${JWT_SECRET}

# Activa Flyway para ejecutar migraciones SQL
spring.flyway.enabled=true

# Carpeta donde estan los archivos de migracion
spring.flyway.locations=classpath:db/migration

# Permite iniciar Flyway si la base ya existe
spring.flyway.baseline-on-migrate=true

# Permite usar flyway clean en desarrollo
spring.flyway.clean-disabled=false
# Activa la generacion de documentacion OpenAPI
springdoc.api-docs.enabled=true

# Activa la interfaz visual de Swagger UI
springdoc.swagger-ui.enabled=true

# Ruta para abrir Swagger UI en el navegador
springdoc.swagger-ui.path=/doc/swagger-ui.html

# Ruta donde se publica el JSON de OpenAPI
springdoc.api-docs.path=/v3/api-docs
# URL donde esta publicado Eureka Server.
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Registra este microservicio en Eureka al iniciar.
eureka.client.register-with-eureka=true

# Permite consultar el registro de servicios desde Eureka.
eureka.client.fetch-registry=true

# Publica preferentemente la IP del servicio en vez del hostname.
eureka.instance.prefer-ip-address=true
