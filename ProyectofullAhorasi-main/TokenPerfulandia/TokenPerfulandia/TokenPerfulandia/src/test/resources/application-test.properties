spring.application.name=token-service-test

# Base de datos temporal: se crea al iniciar los tests y se elimina al terminar.
spring.datasource.url=jdbc:h2:mem:tokendb;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.open-in-view=false

# Propiedades necesarias para generar JWT en pruebas.
jwt.secret=clave-de-pruebas-con-longitud-suficiente-123456
jwt.expiration=3600000

# URL de prueba del microservicio de usuarios.
usuario.service.url=http://localhost:8801

# En este microservicio hay Flyway, pero en tests Hibernate crea las tablas.
spring.flyway.enabled=false

# En pruebas no se registra en Eureka.
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
spring.cloud.discovery.enabled=false
