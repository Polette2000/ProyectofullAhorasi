spring.application.name=AUTH-SERVICE
server.port=8085
usuario.service.url=http://localhost:8801
spring.datasource.url=jdbc:mysql://localhost:3306/bd_token_perfulandia
spring.datasource.username=root
spring.datasource.password=system
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

jwt.secret=clave_secreta_perfulandia_123456789_usuarios
jwt.expiration=3600000

# Para habilitar documentacion con Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Registro del microservicio Token/Auth en Eureka Server.
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
