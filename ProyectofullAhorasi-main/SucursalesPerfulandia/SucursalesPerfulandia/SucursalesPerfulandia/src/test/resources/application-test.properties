spring.application.name=sucursales-service-test

# Base de datos temporal: se crea al iniciar los tests y se elimina al terminar.
spring.datasource.url=jdbc:h2:mem:sucursalesdb;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.open-in-view=false

# La configuracion de seguridad necesita que esta propiedad exista.
# Usa un valor exclusivo para pruebas; no copies el secreto real.
jwt.secret=clave-de-pruebas-con-longitud-suficiente-123456

# En este microservicio hay Flyway, pero en tests Hibernate crea las tablas.
spring.flyway.enabled=false

# En pruebas no se registra en Eureka.
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
spring.cloud.discovery.enabled=false
