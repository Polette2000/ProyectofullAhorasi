spring.application.name=CARRITO-SERVICE

# Puerto donde corre el microservicio de carrito
server.port=8086

# URL de conexion a la base de datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/db_carrito

# Usuario de MySQL
spring.datasource.username=root

# Password de MySQL
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Driver que permite conectar Java con MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate no crea ni modifica tablas, porque las tablas las crea Flyway
spring.jpa.hibernate.ddl-auto=validate

# Muestra las consultas SQL en la consola
spring.jpa.show-sql=true

# Da formato al SQL mostrado en consola
spring.jpa.properties.hibernate.format_sql=true

# Dialecto de Hibernate para MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Clave secreta usada para validar el token JWT
jwt.secret=${JWT_SECRET}

# URL del microservicio de productos
producto.service.url=http://localhost:8084

# URL del microservicio de usuarios
usuario.service.url=http://localhost:8801

# Activa Flyway para ejecutar migraciones SQL
spring.flyway.enabled=true

# Carpeta donde estan los archivos de migracion
spring.flyway.locations=classpath:db/migration

# Permite iniciar Flyway si la base ya existe
spring.flyway.baseline-on-migrate=true

# Permite usar flyway clean en desarrollo
spring.flyway.clean-disabled=false

# Para habilitar configuración con swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Registro del microservicio Carrito en Eureka Server.
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

springdoc.enable-hateoas=false
