spring.application.name=ProductoApplication-dev

server.port=8084

spring.datasource.url=jdbc:mysql://localhost:3306/db_productos
spring.datasource.username=root
spring.datasource.password=system
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.jpa.hibernate.ddl-auto=none
#muestra las consultas SQL en la consola
spring.jpa.show-sql=true
#formatea la salida de las consultas SQL para ver mejor la estructura 
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

jwt.secret=clave_secreta_perfulandia_123456789_usuarios

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.clean-disabled=false
