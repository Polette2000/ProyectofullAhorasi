spring.application.name=SucursalesPerfulandia-dev

# Puerto donde corre el microservicio de sucursales
server.port=8090

# URL de conexion a la base de datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/db_sucursales

# Usuario de MySQL
spring.datasource.username=root

# Password de MySQL
spring.datasource.password=system

# Driver que permite conectar Java con MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate valida las tablas creadas por Flyway
spring.jpa.hibernate.ddl-auto=validate

# Muestra las consultas SQL en la consola
spring.jpa.show-sql=true

# Da formato al SQL mostrado en consola
spring.jpa.properties.hibernate.format_sql=true

# Activa Flyway para ejecutar migraciones SQL
spring.flyway.enabled=true

# Carpeta donde estan los archivos de migracion
spring.flyway.locations=classpath:db/migration

# Permite iniciar Flyway si la base ya existe
spring.flyway.baseline-on-migrate=true

# Valida que las migraciones no hayan cambiado
spring.flyway.validate-on-migrate=true

# Clave secreta usada para validar el token JWT
jwt.secret=clave_secreta_perfulandia_123456789_usuarios
